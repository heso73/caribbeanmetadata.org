<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>CMS — Badge CMS-Compliant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#0a0a0b; --card:#111114; --border:rgba(255,255,255,0.07); --gold:#FFC93C; --text:#e8e4d8; --muted:rgba(232,228,216,0.45); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; padding:48px; min-height:100vh; }
  h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; color:var(--gold); margin-bottom:8px; letter-spacing:0.05em; }
  .sub { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:48px; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:32px; margin-bottom:48px; }
  .badge-wrap { display:flex; flex-direction:column; gap:16px; }
  .badge-label { font-size:9px; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); }

  /* Bouton copier */
  .copy-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:8px 16px; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.1em; cursor:pointer; transition:all 0.2s; width:100%; text-align:left; }
  .copy-btn:hover { border-color:var(--gold); color:var(--gold); }
  .copied { color:#3FA66B !important; border-color:#3FA66B !important; }

  footer { border-top:1px solid var(--border); padding-top:24px; display:flex; justify-content:space-between; font-size:10px; color:var(--muted); }
  .brand { font-family:'Syne',sans-serif; font-weight:800; color:var(--gold); }

  @media print { .copy-btn { display:none; } }
</style>
</head>
<body>

<h1>Badge CMS-Compliant</h1>
<div class="sub">Caribbean Metadata Standard v2.0 · 4 niveaux · SVG intégrable</div>

<div class="grid" id="badgeGrid"></div>

<footer>
  <span class="brand">CMS</span>
  <span>Caribbean Metadata Standard v2.0 · Caribwood Language Lab — caribbeanmetadata.org</span>
</footer>

<script>
const levels = [
  { id:'bronze',   label:'Bronze',   min:20, color:'#CD7F32', glow:'rgba(205,127,50,0.3)',  textColor:'#fff' },
  { id:'silver',   label:'Silver',   min:40, color:'#C0C0C0', glow:'rgba(192,192,192,0.3)', textColor:'#0a0a0b' },
  { id:'gold',     label:'Gold',     min:65, color:'#FFC93C', glow:'rgba(255,201,60,0.35)', textColor:'#0a0a0b' },
  { id:'platinum', label:'Platinum', min:85, color:'#00C2C7', glow:'rgba(0,194,199,0.35)',  textColor:'#fff' },
];

function makeBadgeSVG(level) {
  const w = 240, h = 80;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="g_${level.id}" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M16 0L0 0 0 16" fill="none" stroke="${level.color}" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <filter id="glow_${level.id}">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="${w}" height="${h}" fill="#0a0a0b" rx="3"/>
  <rect width="${w}" height="${h}" fill="url(#g_${level.id})" rx="3"/>

  <!-- Bordure niveau -->
  <rect x="0.75" y="0.75" width="${w-1.5}" height="${h-1.5}" rx="2.5" fill="none" stroke="${level.color}" stroke-width="1.5" opacity="0.6"/>

  <!-- Bande gauche couleur -->
  <rect x="0" y="0" width="5" height="${h}" fill="${level.color}" rx="3"/>
  <rect x="3" y="0" width="2" height="${h}" fill="${level.color}"/>

  <!-- Arc CMS -->
  <path d="M 30 22 Q 20 40 30 58" fill="none" stroke="#00C2C7" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 33 18 Q 18 40 33 62" fill="none" stroke="${level.color}" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <circle cx="30" cy="22" r="3" fill="${level.color}" filter="url(#glow_${level.id})"/>
  <circle cx="30" cy="58" r="3" fill="${level.color}" filter="url(#glow_${level.id})"/>

  <!-- CMS texte -->
  <text x="52" y="34" font-family="'Syne','Arial Black',sans-serif" font-weight="800" font-size="22" fill="#ffffff" letter-spacing="1">CMS</text>

  <!-- Niveau badge -->
  <rect x="52" y="42" width="60" height="16" fill="${level.color}" rx="2"/>
  <text x="82" y="54" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" font-weight="700" fill="${level.textColor}" letter-spacing="2">${level.label.toUpperCase()}</text>

  <!-- Score min -->
  <text x="122" y="54" font-family="'Courier New',monospace" font-size="8" fill="rgba(255,255,255,0.35)" letter-spacing="1">≥ ${level.min} pts</text>

  <!-- Ligne séparatrice verticale -->
  <line x1="175" y1="16" x2="175" y2="64" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- v2.0 + site -->
  <text x="190" y="36" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="${level.color}" letter-spacing="1" opacity="0.9">v2.0</text>
  <text x="190" y="52" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="rgba(255,255,255,0.25)" letter-spacing="0.5">CMS-Compliant</text>
  <text x="190" y="63" text-anchor="middle" font-family="'Courier New',monospace" font-size="6" fill="rgba(255,255,255,0.18)">caribbeanmetadata.org</text>
</svg>`;
}

const grid = document.getElementById('badgeGrid');

levels.forEach(level => {
  const svg = makeBadgeSVG(level);
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);

  const wrap = document.createElement('div');
  wrap.className = 'badge-wrap';
  wrap.innerHTML = `
    <div class="badge-label">${level.label} — ≥ ${level.min} pts</div>
    <div>${svg}</div>
    <button class="copy-btn" onclick="copySVG(this, \`${svg.replace(/`/g,"'")}\`)">⬁ Copier le code SVG</button>
    <a href="${url}" download="CMS_badge_${level.id}.svg" style="text-decoration:none;">
      <button class="copy-btn" style="border-color:rgba(0,194,199,0.3); color:#00C2C7;">↓ Télécharger CMS_badge_${level.id}.svg</button>
    </a>
  `;
  grid.appendChild(wrap);
});

function copySVG(btn, svg) {
  navigator.clipboard.writeText(svg).then(() => {
    btn.textContent = '✓ Copié !';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⬁ Copier le code SVG'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>
