<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <!-- Fond sombre -->
  <rect width="400" height="200" fill="#0a0a0b"/>
  <!-- Grille subtile -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00C2C7" stroke-width="0.15" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="400" height="200" fill="url(#grid)"/>

  <!-- Arc principal turquoise -->
  <path d="M 80 40 Q 20 100 80 160" fill="none" stroke="#00C2C7" stroke-width="8" stroke-linecap="round"/>
  <!-- Arc secondaire or -->
  <path d="M 95 30 Q 22 100 95 170" fill="none" stroke="#FFC93C" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <!-- Points nodaux -->
  <circle cx="80" cy="40" r="6" fill="#FFC93C"/>
  <circle cx="80" cy="160" r="6" fill="#FFC93C"/>
  <circle cx="40" cy="100" r="4" fill="#FF6F61"/>
  <circle cx="55" cy="68" r="3" fill="#3FA66B"/>
  <circle cx="55" cy="132" r="3" fill="#00C2C7"/>

  <!-- Texte CMS -->
  <text x="130" y="120" font-family="'Georgia', serif" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="-2">CMS</text>

  <!-- Sous-titre -->
  <text x="131" y="148" font-family="'Courier New', monospace" font-size="11" fill="#FFC93C" letter-spacing="4">CARIBBEAN METADATA STANDARD</text>

  <!-- Ligne décorative or -->
  <line x1="130" y1="155" x2="370" y2="155" stroke="#FFC93C" stroke-width="1" opacity="0.4"/>

  <!-- Tagline -->
  <text x="131" y="172" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="2">Structurer la visibilité culturelle caribéenne</text>
</svg>
