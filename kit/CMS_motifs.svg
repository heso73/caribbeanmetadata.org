<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="400" fill="#0a0a0b"/>

  <!-- Titre -->
  <text x="450" y="38" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#FFC93C" letter-spacing="6">CMS — MOTIFS &amp; TEXTURES OFFICIELS v2.0</text>
  <line x1="40" y1="50" x2="860" y2="50" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- ══ 01 TRESSAGE DE DONNÉES ══ -->
  <g transform="translate(40, 70)">
    <rect width="240" height="200" rx="4" fill="#003E6B"/>
    <!-- Motif grille madras -->
    <defs>
      <pattern id="tressage" width="20" height="20" patternUnits="userSpaceOnUse">
        <line x1="0" y1="0" x2="20" y2="20" stroke="#00C2C7" stroke-width="0.6" opacity="0.35"/>
        <line x1="20" y1="0" x2="0" y2="20" stroke="#FFC93C" stroke-width="0.4" opacity="0.2"/>
        <line x1="0" y1="10" x2="20" y2="10" stroke="#00C2C7" stroke-width="0.3" opacity="0.15"/>
        <line x1="10" y1="0" x2="10" y2="20" stroke="#FFC93C" stroke-width="0.3" opacity="0.15"/>
      </pattern>
    </defs>
    <rect width="240" height="200" rx="4" fill="url(#tressage)"/>
    <!-- Label centré -->
    <text x="120" y="95" text-anchor="middle" font-family="'Georgia',serif" font-weight="700" font-size="15" fill="#fff">Fond institutionnel</text>
    <text x="120" y="115" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#00C2C7" letter-spacing="2" opacity="0.8">Slides · White Paper · Certificat</text>
  </g>
  <text x="160" y="288" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="rgba(255,199,60,0.6)" letter-spacing="2">01 · TRESSAGE DE DONNÉES</text>
  <text x="160" y="305" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="rgba(232,228,216,0.35)" letter-spacing="1">Madras · Vannerie · Réseau</text>

  <!-- ══ 02 ONDES CARIBÉENNES ══ -->
  <g transform="translate(330, 70)">
    <rect width="240" height="200" rx="4" fill="#111114"/>
    <!-- Ondes sinusoïdales -->
    <!-- Onde turquoise épaisse -->
    <path d="M0,80 C30,55 60,55 90,80 C120,105 150,105 180,80 C210,55 230,55 240,65" fill="none" stroke="#00C2C7" stroke-width="3" opacity="0.9"/>
    <!-- Onde turquoise fine -->
    <path d="M0,100 C30,75 60,75 90,100 C120,125 150,125 180,100 C210,75 230,75 240,85" fill="none" stroke="#00C2C7" stroke-width="1.5" opacity="0.5"/>
    <!-- Onde or -->
    <path d="M0,120 C30,95 60,95 90,120 C120,145 150,145 180,120 C210,95 230,95 240,105" fill="none" stroke="#FFC93C" stroke-width="2" opacity="0.8"/>
    <!-- Onde or fine -->
    <path d="M0,140 C30,115 60,115 90,140 C120,165 150,165 180,140 C210,115 230,115 240,125" fill="none" stroke="#FFC93C" stroke-width="1" opacity="0.4"/>
    <!-- Onde corail -->
    <path d="M0,160 C30,135 60,135 90,160 C120,185 150,185 180,160 C210,135 230,135 240,145" fill="none" stroke="#FF6F61" stroke-width="1.5" opacity="0.6"/>
  </g>
  <text x="450" y="288" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="rgba(255,199,60,0.6)" letter-spacing="2">02 · ONDES CARIBÉENNES</text>
  <text x="450" y="305" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="rgba(232,228,216,0.35)" letter-spacing="1">Vagues · Rythme · Musicalité créole</text>

  <!-- ══ 03 RÉSEAU DE DONNÉES ══ -->
  <g transform="translate(620, 70)">
    <rect width="240" height="200" rx="4" fill="#111114"/>
    <!-- Nœuds du réseau -->
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <!-- Lignes réseau -->
    <line x1="60" y1="60" x2="120" y2="40" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <line x1="120" y1="40" x2="180" y2="70" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <line x1="60" y1="60" x2="40" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <line x1="60" y1="60" x2="120" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <line x1="120" y1="40" x2="120" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <line x1="180" y1="70" x2="200" y2="130" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <line x1="120" y1="100" x2="160" y2="155" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <line x1="40" y1="120" x2="80" y2="160" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <line x1="80" y1="160" x2="160" y2="155" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <line x1="160" y1="155" x2="200" y2="130" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <!-- Nœuds -->
    <circle cx="120" cy="40" r="8" fill="#003E6B" stroke="#00C2C7" stroke-width="2" filter="url(#glow)"/>
    <circle cx="60" cy="60" r="6" fill="#003E6B" stroke="#FFC93C" stroke-width="2"/>
    <circle cx="180" cy="70" r="5" fill="#003E6B" stroke="#00C2C7" stroke-width="1.5" opacity="0.7"/>
    <circle cx="40" cy="120" r="5" fill="#003E6B" stroke="#3FA66B" stroke-width="1.5"/>
    <circle cx="120" cy="100" r="7" fill="#003E6B" stroke="#FFC93C" stroke-width="2"/>
    <circle cx="200" cy="130" r="4" fill="#003E6B" stroke="#FF6F61" stroke-width="1.5" opacity="0.8"/>
    <circle cx="80" cy="160" r="6" fill="#003E6B" stroke="#00C2C7" stroke-width="2"/>
    <circle cx="160" cy="155" r="5" fill="#003E6B" stroke="#FFC93C" stroke-width="1.5"/>
  </g>
  <text x="740" y="288" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="rgba(255,199,60,0.6)" letter-spacing="2">03 · RÉSEAU DE DONNÉES</text>
  <text x="740" y="305" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="rgba(232,228,216,0.35)" letter-spacing="1">Connexions · Métadonnées · Graphe</text>

  <!-- Footer -->
  <line x1="40" y1="345" x2="860" y2="345" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="40" y="368" font-family="'Courier New',monospace" font-size="9" fill="rgba(232,228,216,0.3)" letter-spacing="2">CARIBBEAN METADATA STANDARD — CHARTE GRAPHIQUE OFFICIELLE v2.0</text>
  <text x="860" y="368" text-anchor="end" font-family="'Courier New',monospace" font-size="9" fill="#FFC93C" letter-spacing="2">CMS</text>
</svg>
