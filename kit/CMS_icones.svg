<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0L0 0 0 20" fill="none" stroke="#00C2C7" stroke-width="0.15" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Fond global -->
  <rect width="900" height="320" fill="#0a0a0b"/>
  <rect width="900" height="320" fill="url(#g)"/>

  <!-- Titre -->
  <text x="450" y="38" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#FFC93C" letter-spacing="6">CMS — ICONOGRAPHIE OFFICIELLE v2.0</text>
  <line x1="40" y1="50" x2="860" y2="50" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- ── 01 LANGUE ── -->
  <g transform="translate(75, 100)">
    <rect x="-55" y="-55" width="110" height="110" rx="4" fill="#111114"/>
    <!-- Écran/moniteur -->
    <rect x="-28" y="-22" width="56" height="36" rx="3" fill="none" stroke="#00C2C7" stroke-width="2"/>
    <line x1="-18" y1="-10" x2="18" y2="-10" stroke="#00C2C7" stroke-width="1.5" opacity="0.6"/>
    <line x1="-18" y1="-2" x2="12" y2="-2" stroke="#00C2C7" stroke-width="1.5" opacity="0.6"/>
    <line x1="-18" y1="6" x2="16" y2="6" stroke="#00C2C7" stroke-width="1.5" opacity="0.6"/>
    <!-- Pied -->
    <line x1="0" y1="14" x2="0" y2="26" stroke="#00C2C7" stroke-width="2"/>
    <line x1="-12" y1="26" x2="12" y2="26" stroke="#00C2C7" stroke-width="2"/>
    <!-- Label -->
    <text y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="rgba(232,228,216,0.6)" letter-spacing="2">LANGUE</text>
  </g>

  <!-- ── 02 CULTURE ── -->
  <g transform="translate(225, 100)">
    <rect x="-55" y="-55" width="110" height="110" rx="4" fill="#111114"/>
    <!-- Forme organique caribéenne -->
    <path d="M 0 -28 C 16 -28 28 -16 28 0 C 28 16 16 28 0 28 C -16 28 -28 16 -28 0 C -28 -16 -16 -28 0 -28 Z" fill="none" stroke="#FFC93C" stroke-width="2"/>
    <!-- Croix intérieure cible -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="#FFC93C" stroke-width="1.5"/>
    <line x1="-28" y1="0" x2="28" y2="0" stroke="#FFC93C" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#FFC93C" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#FFC93C"/>
    <text y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="rgba(232,228,216,0.6)" letter-spacing="2">CULTURE</text>
  </g>

  <!-- ── 03 RYTHME ── -->
  <g transform="translate(375, 100)">
    <rect x="-55" y="-55" width="110" height="110" rx="4" fill="#111114"/>
    <!-- Onde ECG -->
    <polyline points="-40,0 -25,0 -18,-22 -10,22 -2,-14 6,14 14,0 40,0"
      fill="none" stroke="#FF6F61" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="rgba(232,228,216,0.6)" letter-spacing="2">RYTHME</text>
  </g>

  <!-- ── 04 GÉOGRAPHIE ── -->
  <g transform="translate(525, 100)">
    <rect x="-55" y="-55" width="110" height="110" rx="4" fill="#111114"/>
    <!-- Île organique -->
    <ellipse cx="0" cy="6" rx="22" ry="16" fill="#3FA66B" opacity="0.25"/>
    <ellipse cx="0" cy="6" rx="22" ry="16" fill="none" stroke="#3FA66B" stroke-width="2"/>
    <!-- Point nord -->
    <circle cx="0" cy="-18" r="5" fill="#FFC93C"/>
    <!-- Ligne nord-île -->
    <line x1="0" y1="-13" x2="0" y2="-10" stroke="#FFC93C" stroke-width="1.5" opacity="0.6"/>
    <text y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="rgba(232,228,216,0.6)" letter-spacing="1">GÉOGRAPHIE</text>
  </g>

  <!-- ── 05 HISTOIRE ── -->
  <g transform="translate(675, 100)">
    <rect x="-55" y="-55" width="110" height="110" rx="4" fill="#111114"/>
    <!-- Spirale mémorielle -->
    <path d="M 0 0 Q 8 -8 16 0 Q 24 8 16 16 Q 8 24 0 16 Q -8 8 0 0" fill="none" stroke="#003E6B" stroke-width="0" opacity="0"/>
    <path d="M 2 2 C 12 -10 28 -10 28 2 C 28 18 12 28 0 22 C -14 16 -20 0 -12 -10 C -4 -20 10 -22 20 -16"
      fill="none" stroke="#00C2C7" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="20" cy="-16" r="3" fill="#00C2C7"/>
    <text y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="rgba(232,228,216,0.6)" letter-spacing="2">HISTOIRE</text>
  </g>

  <!-- ── 06 DONNÉES ── -->
  <g transform="translate(825, 100)">
    <rect x="-55" y="-55" width="110" height="110" rx="4" fill="#111114"/>
    <!-- Graphe triangulaire réseau -->
    <line x1="0" y1="-24" x2="-22" y2="16" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <line x1="0" y1="-24" x2="22" y2="16" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <line x1="-22" y1="16" x2="22" y2="16" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <circle cx="0" cy="-24" r="5" fill="#003E6B" stroke="#00C2C7" stroke-width="2"/>
    <circle cx="-22" cy="16" r="5" fill="#003E6B" stroke="#FFC93C" stroke-width="2"/>
    <circle cx="22" cy="16" r="5" fill="#003E6B" stroke="#FF6F61" stroke-width="2"/>
    <text y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="rgba(232,228,216,0.6)" letter-spacing="2">DONNÉES</text>
  </g>

  <!-- Numéros -->
  <text x="30" y="72" font-family="'Courier New',monospace" font-size="8" fill="rgba(255,199,60,0.4)" letter-spacing="1">01</text>
  <text x="180" y="72" font-family="'Courier New',monospace" font-size="8" fill="rgba(255,199,60,0.4)" letter-spacing="1">02</text>
  <text x="330" y="72" font-family="'Courier New',monospace" font-size="8" fill="rgba(255,199,60,0.4)" letter-spacing="1">03</text>
  <text x="480" y="72" font-family="'Courier New',monospace" font-size="8" fill="rgba(255,199,60,0.4)" letter-spacing="1">04</text>
  <text x="630" y="72" font-family="'Courier New',monospace" font-size="8" fill="rgba(255,199,60,0.4)" letter-spacing="1">05</text>
  <text x="780" y="72" font-family="'Courier New',monospace" font-size="8" fill="rgba(255,199,60,0.4)" letter-spacing="1">06</text>

  <!-- Footer -->
  <line x1="40" y1="270" x2="860" y2="270" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="40" y="290" font-family="'Courier New',monospace" font-size="9" fill="rgba(232,228,216,0.3)" letter-spacing="2">CARIBBEAN METADATA STANDARD — CHARTE GRAPHIQUE OFFICIELLE v2.0</text>
  <text x="860" y="290" text-anchor="end" font-family="'Courier New',monospace" font-size="9" fill="#FFC93C" letter-spacing="2">CMS</text>
</svg>
